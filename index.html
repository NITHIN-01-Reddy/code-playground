<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Code Playground</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="playground">
        <!-- Header -->
        <header class="header">
            <div class="header-left">
                <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                    <polyline points="16 18 22 12 16 6"></polyline>
                    <polyline points="8 6 2 12 8 18"></polyline>
                </svg>
                <h1>Code Playground</h1>
            </div>
            
            <div class="header-right">
                <select id="templateSelect" class="template-select" title="Load Template" aria-label="Load Template">
                    <option value="">Load Template</option>
                    <option value="blank">Blank</option>
                    <option value="gradientCard">Gradient Card</option>
                    <option value="particleEffect">Particle Effect</option>
                    <option value="todoApp">Todo App</option>
                </select>
                
                <button id="shareBtn" class="btn btn-blue">
                    <svg class="icon-sm" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                        <circle cx="18" cy="5" r="3"></circle>
                        <circle cx="6" cy="12" r="3"></circle>
                        <circle cx="18" cy="19" r="3"></circle>
                        <line x1="8.59" y1="13.51" x2="15.42" y2="17.49"></line>
                        <line x1="15.41" y1="6.51" x2="8.59" y2="10.49"></line>
                    </svg>
                    Share
                </button>
                
                <button id="downloadBtn" class="btn btn-green">
                    <svg class="icon-sm" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                        <polyline points="7 10 12 15 17 10"></polyline>
                        <line x1="12" y1="15" x2="12" y2="3"></line>
                    </svg>
                    Export
                </button>
            </div>
        </header>

        <div class="main-content">
            <!-- Editor Panel -->
            <div class="editor-panel">
                <!-- Tabs -->
                <div class="tabs">
                    <button class="tab active" data-tab="html">
                        <svg class="icon-sm" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                            <polyline points="16 18 22 12 16 6"></polyline>
                            <polyline points="8 6 2 12 8 18"></polyline>
                        </svg>
                        HTML
                    </button>
                    <button class="tab" data-tab="css">
                        <svg class="icon-sm" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                            <path d="M12 2l10 17.5H2L12 2z"></path>
                        </svg>
                        CSS
                    </button>
                    <button class="tab" data-tab="js">
                        <svg class="icon-sm" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                            <polyline points="16 18 22 12 16 6"></polyline>
                            <polyline points="8 6 2 12 8 18"></polyline>
                        </svg>
                        JavaScript
                    </button>
                </div>

                <!-- Code Editors -->
                <div class="editors">
                    <textarea id="htmlEditor" class="editor active" spellcheck="false" title="HTML Editor" placeholder="Enter HTML code here"></textarea>
                    <textarea id="cssEditor" class="editor" spellcheck="false" title="CSS Editor" placeholder="Enter CSS code here"></textarea>
                    <textarea id="jsEditor" class="editor" spellcheck="false" title="JavaScript Editor" placeholder="Enter JavaScript code here"></textarea>
                </div>

                <!-- Console -->
                <div id="consolePanel" class="console-panel hidden">
                    <div class="console-header">Console Output</div>
                    <div id="consoleOutput" class="console-output"></div>
                </div>
            </div>

            <!-- Preview Panel -->
            <div class="preview-panel">
                <div class="preview-header">
                    <div class="preview-title">
                        <svg class="icon-sm" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                            <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                            <line x1="9" y1="3" x2="9" y2="21"></line>
                        </svg>
                        Preview
                    </div>
                    <button id="runBtn" class="btn btn-run">
                        <svg class="icon-sm" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                            <polygon points="5 3 19 12 5 21 5 3"></polygon>
                        </svg>
                        Run
                    </button>
                </div>
                <iframe id="preview" class="preview-iframe" title="Live preview" sandbox="allow-scripts"></iframe>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
